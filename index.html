<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FleetTrack TBO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
    margin:0;
    font-family: Inter;
    background:#0a0f1e;
    color:#fff;
}

/* LOGIN */
.login-overlay{
    position:fixed; inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#0a0f1e;
}

.login-card{
    background:#111827;
    padding:30px;
    border-radius:15px;
    width:320px;
}

input{
    width:100%;
    margin:10px 0;
    padding:10px;
}

/* APP */
.app{display:none; height:100vh;}

.sidebar{
    width:220px;
    background:#0f172a;
    float:left;
    height:100vh;
    padding:15px;
}

.main{
    margin-left:220px;
    padding:20px;
}

.nav-item{
    padding:10px;
    cursor:pointer;
}

.nav-item.active{
    background:#3b82f6;
}

.workspace{display:none;}
.workspace.active{display:block;}

button{
    padding:10px;
    width:100%;
    background:#3b82f6;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginScreen">
    <div class="login-card">
        <h3>FleetTrack</h3>

        <input id="loginInput" placeholder="login">
        <input id="passwordInput" type="password" placeholder="password">

        <button onclick="login()">Войти</button>
        <p id="loginError" style="color:red;"></p>
    </div>
</div>

<!-- APP -->
<div class="app" id="app">

    <div class="sidebar">
        <div class="nav-item active" onclick="showWorkspace('dashboard')">Dashboard</div>
        <div class="nav-item" onclick="showWorkspace('map')">Map</div>
    </div>

    <div class="main">

        <h2 id="title">Dashboard</h2>

        <div class="workspace active" id="workspace-dashboard">
            <h3>Добро пожаловать 🚛</h3>
        </div>

        <div class="workspace" id="workspace-map">
            <div id="map" style="height:400px"></div>
        </div>

    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const DB = {
    users:{
        dispatcher:{password:"555",name:"Диспетчер",role:"dispatcher"},
        director:{password:"777",name:"Директор",role:"director"},
        ivanov:{password:"12345",name:"Иванов",role:"driver"}
    }
};

let currentUser=null;
let map=null;

/* ================= LOGIN ================= */
function login(){
    const login=document.getElementById("loginInput").value;
    const pass=document.getElementById("passwordInput").value;
    const err=document.getElementById("loginError");

    const user=DB.users[login];

    if(!user || user.password!==pass){
        err.textContent="Неверный логин или пароль";
        return;
    }

    currentUser=user;

    document.getElementById("loginScreen").style.display="none";
    document.getElementById("app").style.display="block";

    init();
}

/* ================= INIT ================= */
function init(){
    showWorkspace("dashboard");
}

/* ================= NAV ================= */
function showWorkspace(id){

    document.querySelectorAll(".workspace").forEach(w=>{
        w.classList.remove("active");
    });

    document.getElementById("workspace-"+id).classList.add("active");

    document.getElementById("title").textContent=id;

    if(id==="map") initMap();
}

/* ================= MAP ================= */
function initMap(){

    if(map) return;

    map = L.map('map').setView([52.9649,63.1235], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        attribution:'OSM'
    }).addTo(map);

    L.marker([52.9649,63.1235]).addTo(map)
        .bindPopup("Мусоровоз 1");
}

/* ================= TOAST ================= */
function showToast(msg){
    alert(msg);
}
</script>

</body>
</html>
